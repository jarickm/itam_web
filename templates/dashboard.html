{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold mb-0" style="color: #064e3b;">System Overview</h2>
        <div class="text-muted fw-bold small">DATABASE STATUS: <span class="text-success">● ONLINE</span></div>
    </div>

    <div class="row g-4">
        <!-- Card 1 -->
        <div class="col-md-3">
            <div class="card-stat h-100 d-flex flex-column justify-content-between">
                <div>
                    <h6 class="text-muted fw-bold small mb-3">TOTAL ASSETS</h6>
                    <h2 class="display-5 fw-bold" style="color: #059669;">{{ stats.total }}</h2>
                </div>
                <div class="text-end text-success fs-2"><i class="fas fa-boxes"></i></div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-3">
            <div class="card-stat h-100 d-flex flex-column justify-content-between">
                <div>
                    <h6 class="text-muted fw-bold small mb-3">AVAILABLE (IN-STOCK)</h6>
                    <h2 class="display-5 fw-bold text-success">{{ stats.available }}</h2>
                </div>
                <div class="text-end text-success fs-2"><i class="fas fa-check-circle"></i></div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-3">
            <div class="card-stat h-100 d-flex flex-column justify-content-between">
                <div>
                    <h6 class="text-muted fw-bold small mb-3">DEPLOYED / ISSUED</h6>
                    <h2 class="display-5 fw-bold text-info">{{ stats.deployed }}</h2>
                </div>
                <div class="text-end text-info fs-2"><i class="fas fa-user-tag"></i></div>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="col-md-3">
            <div class="card-stat h-100 d-flex flex-column justify-content-between">
                <div>
                    <h6 class="text-muted fw-bold small mb-3">MAINTENANCE</h6>
                    <h2 class="display-5 fw-bold text-warning">{{ stats.maintenance }}</h2>
                </div>
                <div class="text-end text-warning fs-2"><i class="fas fa-tools"></i></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
