<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CCI ITAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f9fafb; font-family: 'Inter', sans-serif; }
        .login-card { max-width: 400px; margin: 100px auto; border-radius: 15px; border: 1px solid #d1fae5; }
        .btn-emerald { background-color: #059669; color: white; font-weight: bold; }
        .btn-emerald:hover { background-color: #047857; color: white; }
        .brand-text { color: #064e3b; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card shadow-sm p-4">
            <div class="text-center mb-4">
                <h2 class="brand-text">CCI ITAM</h2>
                <p class="text-muted">Enter credentials to continue</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger py-2">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">USERNAME</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">PASSWORD</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-emerald w-100 py-2 mt-2">Secure Login</button>
            </form>
        </div>
    </div>
</body>
</html>
